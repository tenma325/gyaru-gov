<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GYARU-GOV 改修方向 3案比較</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #1a1a1a; color: #f5f5f5; padding: 1rem; }
    header { text-align: center; margin-bottom: 1rem; }
    h1 { font-size: 1.25rem; letter-spacing: 0.1em; }
    p { font-size: 0.85rem; color: #aaa; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
    .col { display: flex; flex-direction: column; gap: 0.5rem; }
    .col h2 { font-size: 0.9rem; padding: 0.5rem 0.75rem; background: #333; border-radius: 4px; }
    iframe { width: 100%; height: 85vh; border: 1px solid #444; border-radius: 6px; background: #fff; }
    @media (max-width: 1200px) { .grid { grid-template-columns: 1fr; } iframe { height: 60vh; } }
  </style>
</head>
<body>
  <header>
    <h1>行政×ギャル 改修方向 3案比較</h1>
    <p>A / B / C それぞれの雰囲気を確認してください</p>
  </header>
  <div class="grid">
    <div class="col">
      <h2>A: 区役所パンフレットをギャルがデコった</h2>
      <iframe src="./mockup-a.html" loading="lazy"></iframe>
    </div>
    <div class="col">
      <h2>B: 令和のカタログ / 80-90s commercial pop</h2>
      <iframe src="./mockup-b.html" loading="lazy"></iframe>
    </div>
    <div class="col">
      <h2>C: 高級スイーツ × public signage</h2>
      <iframe src="./mockup-c.html" loading="lazy"></iframe>
    </div>
  </div>
</body>
</html>
